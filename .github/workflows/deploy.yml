name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# 授予 GITHUB_TOKEN 写入权限
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run docs:build

      - name: 部署到 GitHub Pages（最多重试 5 次）
        run: |
          cd .vitepress/dist
          git init
          git checkout -b gh-pages
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)" --allow-empty
          for i in 1 2 3 4 5; do
            echo "::group::第 $i/5 次推送尝试"
            if git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages:gh-pages 2>&1; then
              echo "::endgroup::"
              echo "✅ 部署成功（第 $i 次尝试）"
              exit 0
            fi
            echo "::endgroup::"
            echo "❌ 第 $i 次失败，等待 15 秒后重试..."
            sleep 15
          done
          echo "❌ 5 次全部失败"
          exit 1
